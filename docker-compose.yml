# Local preview stack — everything the platform needs, self-contained.
# Credentials below are throwaway local-only defaults, not secrets.
#
#   docker compose up --build
#   docker compose exec web pnpm --filter @assessify/web exec tsx scripts/bootstrap-admin.ts you@example.com "a strong password" "Your Name"
#
# Then open http://localhost:3000/login.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: assessify
      POSTGRES_USER: assessify
      POSTGRES_PASSWORD: assessify
    ports:
      - "5432:5432"
    volumes:
      - assessify-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assessify -d assessify"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

  pdf-service:
    build:
      context: ./apps/pdf-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"

  # S3-compatible object storage for local preview (Hetzner Object Storage
  # stand-in). Our adapter (packages/adapters/src/storage/providers/s3.ts) is
  # virtual-hosted-style only (bucket.host), so MinIO needs a hostname alias
  # matching the bucket name — see the network alias below.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: assessify
      MINIO_ROOT_PASSWORD: assessify123
      MINIO_REGION_NAME: us-east-1
      # Without this, MinIO assumes path-style and misparses our
      # virtual-hosted-style requests (bucket.host) — first path segment
      # gets read as the bucket name instead of the object key.
      MINIO_DOMAIN: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - assessify-minio:/data
    networks:
      default:
        aliases:
          # Must equal {S3_BUCKET}.minio so the virtual-hosted-style adapter
          # resolves the right container.
          - assessify-assets.minio
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 assessify assessify123 &&
      (mc mb local/assessify-assets || true) &&
      mc anonymous set download local/assessify-assets
      "
    depends_on:
      minio:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: build
    command: ["pnpm", "--filter", "@assessify/db", "migrate"]
    environment:
      DATABASE_URL: postgres://assessify:assessify@postgres:5432/assessify
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://assessify:assessify@postgres:5432/assessify
      BETTER_AUTH_SECRET: local-dev-secret-please-change-32chars
      BETTER_AUTH_URL: http://localhost:3000
      RESPONDENT_SESSION_SECRET: local-dev-secret-please-change-32chars
      REDIS_URL: redis://redis:6379
      ADMIN_HOSTNAMES: localhost,127.0.0.1,web
      PDF_SERVICE_URL: http://pdf-service:8080
      S3_REGION: us-east-1
      S3_BUCKET: assessify-assets
      S3_ACCESS_KEY_ID: assessify
      S3_SECRET_ACCESS_KEY: assessify123
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgres://assessify:assessify@postgres:5432/assessify
      REDIS_URL: redis://redis:6379
      PDF_SERVICE_URL: http://pdf-service:8080
      S3_REGION: us-east-1
      S3_BUCKET: assessify-assets
      S3_ACCESS_KEY_ID: assessify
      S3_SECRET_ACCESS_KEY: assessify123
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

volumes:
  assessify-postgres:
  assessify-minio:
